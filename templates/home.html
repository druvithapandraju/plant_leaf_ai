<h1>🌿 Plant Disease Detection</h1>

<!-- INPUT ROW -->
<div class="input-row">

    <!-- DRAG -->

        <h3>📦 Drag & Drop</h3>
        <div id="drop-area">Drop Image Here</div>

    <!-- FILE SCAN -->
    <form class="box" action="/predict_scan" method="post" enctype="multipart/form-data">
        <h3>📁 Scan Image</h3>
        <input type="file" name="file" accept="image/*" required>
        <br><br>
        <button type="submit">🔍 Predict</button>
    </form>

    <!-- CAMERA -->
    <div class="box">
        <h3>📷 Live Scan</h3>

        <button type="button" onclick="startCamera()">Open Camera</button>

        <video id="video" autoplay playsinline style="display:none;"></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <form id="cameraForm" method="POST" action="/predict_camera">
            <input type="hidden" name="image_data" id="image_data">
        </form>

        <br>
        <button type="button" onclick="captureImage()" id="captureBtn" style="display:none;">
            📷 Scan Leaf
        </button>
    </div>

</div>

<h2 class="sample-title">📂 Sample Leaves</h2>

<div class="dataset">

    <div class="dataset-item" onclick="sendImage(this)">

<!-- ================= SCRIPT ================= -->

<script>

// DRAG & DROP
const dropArea = document.getElementById("drop-area");

dropArea.addEventListener("dragover", e => e.preventDefault());

dropArea.addEventListener("drop", e => {
    e.preventDefault();

    const file = e.dataTransfer.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("file", file);

    fetch("/predict_drag", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(html => {
        document.open();
        document.write(html);
        document.close();
    })
    .catch(() => alert("Error uploading image"));
});


// CAMERA
function startCamera() {
    const video = document.getElementById("video");
    const btn = document.getElementById("captureBtn");

    video.style.display = "block";
    btn.style.display = "inline-block";

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => video.srcObject = stream)
        .catch(() => alert("Camera permission denied"));
}

function captureImage() {
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const data = canvas.toDataURL("image/png");

    document.getElementById("image_data").value = data;
    document.getElementById("cameraForm").submit();
}


// SAMPLE CLICK
function sendImage(el) {
    const imgSrc = el.querySelector("img").src;

    fetch(imgSrc)
    .then(res => res.blob())
    .then(blob => {
        const file = new File([blob], "sample.jpg", { type: blob.type });

        const formData = new FormData();
        formData.append("file", file);

        return fetch("/predict_drag", {
            method: "POST",
            body: formData
        });
    })
    .then(res => res.text())
    .then(html => {
        document.open();
        document.write(html);
        document.close();
    })
    .catch(() => alert("Error loading sample image"));
}

</script>
